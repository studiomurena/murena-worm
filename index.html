<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - Win95 Desktop Worm (Explosive Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: 'VT323', monospace;
        }

        #crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 900; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        canvas {
            display: block; width: 100%; height: 100%; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="crt-overlay"></div>
    <canvas id="visualizer"></canvas>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 1. CARICAMENTO LOGO E ASSET ---
        const logoImg = new Image();
        logoImg.src = 'assets/logo-studiomurena.png'; 
        
        const tintedLogo = document.createElement('canvas');
        const tintedCtx = tintedLogo.getContext('2d');

        logoImg.onload = () => {
            tintedLogo.width = logoImg.width; tintedLogo.height = logoImg.height;
            tintedCtx.drawImage(logoImg, 0, 0);
            tintedCtx.globalCompositeOperation = 'source-in';
            
            let grad = tintedCtx.createLinearGradient(0, 0, 0, logoImg.height);
            grad.addColorStop(0, '#ff5555'); grad.addColorStop(0.5, '#ff0000'); grad.addColorStop(1, '#880000'); 
            
            tintedCtx.fillStyle = grad;
            tintedCtx.fillRect(0, 0, logoImg.width, logoImg.height);
        };

        const tunnelImg = new Image();
        tunnelImg.src = 'assets/ai-boss-tunnel.png';

        // --- 2. GENERAZIONE CARTELLE DESKTOP ---
        const folderNames = [
            "JAZZ HIGHLANDERS", "BUTTERBEAN", "VIENNA", "BABA JAGA", 
            "NOSTALGIA", "LONG JOHN SILVER", "ECLISSI", "MARMO",
            "CANNE MOZZE", "WADIRUM", "TOXIC", "VAI VIA", "MON AMI"
        ];
        let folders = [];
        for(let i=0; i<folderNames.length; i++) {
            folders.push({
                x: Math.random() * (canvas.width - 200) + 100, 
                y: Math.random() * (canvas.height - 200) + 100,
                name: folderNames[i]
            });
        }

        // --- 3. MOTORE RENDERING WIN95 ---
        function drawWin95Window(x, y, w, h, title, isActive = false) {
            ctx.fillStyle = '#c0c0c0'; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, 2); ctx.fillRect(x, y, 2, h); 
            ctx.fillStyle = '#000000'; ctx.fillRect(x+w-2, y, 2, h); ctx.fillRect(x, y+h-2, w, 2); 
            ctx.fillStyle = '#808080'; ctx.fillRect(x+w-4, y+2, 2, h-4); ctx.fillRect(x+2, y+h-4, w-4, 2);
            ctx.fillStyle = isActive ? '#0000a8' : '#808080'; ctx.fillRect(x+4, y+4, w-8, 22); 
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px VT323'; ctx.textAlign = 'left'; ctx.fillText(title, x + 8, y + 20); 
            ctx.fillStyle = '#c0c0c0'; let btnX = x + w - 24; let btnY = y + 6; ctx.fillRect(btnX, btnY, 16, 16); 
            ctx.fillStyle = '#ffffff'; ctx.fillRect(btnX, btnY, 16, 1); ctx.fillRect(btnX, btnY, 1, 16);
            ctx.fillStyle = '#000000'; ctx.fillRect(btnX+15, btnY, 1, 16); ctx.fillRect(btnX, btnY+15, 16, 1);
            ctx.fillStyle = '#000000'; ctx.font = 'bold 14px Arial'; ctx.fillText('x', btnX + 4, btnY + 12);
        }

        function drawWin95Button(x, y, w, h, text, isPressed) {
            ctx.fillStyle = '#c0c0c0'; ctx.fillRect(x, y, w, h);
            if(isPressed) {
                ctx.fillStyle = '#000000'; ctx.fillRect(x, y, w, 1); ctx.fillRect(x, y, 1, h);
                ctx.fillStyle = '#808080'; ctx.fillRect(x+1, y+1, w-2, 1); ctx.fillRect(x+1, y+1, 1, h-2);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(x+w-1, y, 1, h); ctx.fillRect(x, y+h-1, w, 1);
            } else {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, 1); ctx.fillRect(x, y, 1, h);
                ctx.fillStyle = '#000000'; ctx.fillRect(x+w-1, y, 1, h); ctx.fillRect(x, y+h-1, w, 1);
                ctx.fillStyle = '#808080'; ctx.fillRect(x+w-2, y+1, 1, h-2); ctx.fillRect(x+1, y+h-2, w-2, 1);
            }
            ctx.fillStyle = '#000000'; ctx.font = '22px VT323'; ctx.textAlign = 'center';
            let offset = isPressed ? 2 : 0; ctx.fillText(text, x + w/2 + offset, y + h/2 + 6 + offset);
        }

        // --- 4. IL WORM ASCII OOP E GESTIONE ESPLOSIONI ---
        let droppedErrors = []; 
        let arrayMurene = [];

        class MurenaWorm {
            constructor() {
                this.corpo = [];
                this.lunghezza = 80;
                this.t = 0;
                
                this.dirX = Math.random() > 0.5 ? 1 : -1;
                this.startX = this.dirX === 1 ? -400 : canvas.width + 400;
                this.speedX = Math.random() * 5 + 4;
                this.baseY = (canvas.height / 2) + (Math.random() * 500 - 250);
                
                this.w1 = Math.random() * 0.015 + 0.005; this.a1 = Math.random() * 200 + 50;
                this.w2 = Math.random() * 0.025 + 0.015; this.a2 = Math.random() * 100 + 50;
                this.w3 = Math.random() * 0.05 + 0.030; this.a3 = Math.random() * 50 + 20;

                for(let i=0; i<this.lunghezza; i++) {
                    this.corpo.push({ x: this.startX, y: this.baseY, char: (Math.random()>0.5)?'#':'@' });
                }
            }

            update() {
                this.t++;
                let headX = this.startX + (this.t * this.speedX * this.dirX);
                
                let ondaGrande = Math.sin(this.t * this.w1) * this.a1;
                let ondaMedia = Math.cos(this.t * this.w2) * this.a2;
                let ondaPiccola = Math.sin(this.t * this.w3) * this.a3;
                let headY = this.baseY + ondaGrande + ondaMedia + ondaPiccola;

                this.corpo.unshift({ x: headX, y: headY, char: (Math.random()>0.5)?'#':'@' });
                if(this.corpo.length > this.lunghezza) this.corpo.pop();

                // Drop Errore
                if (Math.random() > 0.88) {
                    droppedErrors.push({ x: headX, y: headY, age: 0, exploding: 0 });
                    if(droppedErrors.length > 50) droppedErrors.shift(); 
                }

                // COLLISIONE: Il verme sbatte contro i SUOI STESSI ERRORI
                for (let i = droppedErrors.length - 1; i >= 0; i--) {
                    let err = droppedErrors[i];
                    err.age++;
                    
                    if (err.exploding === 0 && err.age > 40) { // Deve invecchiare un po' per non esplodere appena nato
                        let dist = Math.hypot(headX - err.x, headY - err.y);
                        if (dist < 60) {
                            err.exploding = 1; // INNESCA L'ESPLOSIONE
                        }
                    }
                }
            }

            draw() {
                ctx.textAlign = 'center';
                for(let i=0; i<this.corpo.length; i++) {
                    let p = this.corpo[i];
                    let size = 60 - (i * 0.5);
                    let opacity = 1 - (i / this.lunghezza);
                    
                    ctx.fillStyle = `rgba(0, 255, 65, ${opacity})`;
                    ctx.font = `bold ${size}px monospace`;
                    let shiftX = (Math.random() > 0.9) ? (Math.random()-0.5)*20 : 0; 
                    ctx.fillText((Math.random()>0.8)?'X':p.char, p.x + shiftX, p.y);
                }
            }

            isDead() {
                let coda = this.corpo[this.corpo.length - 1];
                return (this.dirX === 1 && coda.x > canvas.width + 300) || (this.dirX === -1 && coda.x < -300);
            }
        }

        function drawDroppedErrors() {
            for (let i = droppedErrors.length - 1; i >= 0; i--) {
                let err = droppedErrors[i];

                if (err.exploding > 0) {
                    err.exploding++;
                    // ANIMAZIONE ESPLOSIONE GLITCHATA
                    let progress = err.exploding / 15; // Dura 15 frame
                    let size = 140 + (progress * 50); // Si allarga
                    
                    ctx.fillStyle = (Math.random() > 0.5) ? '#ff0000' : '#ffffff';
                    let gX = err.x - (size/2) + (Math.random()-0.5)*30;
                    let gY = err.y - 40 + (Math.random()-0.5)*30;
                    
                    ctx.globalAlpha = 1 - progress; // Svanisce
                    ctx.fillRect(gX, gY, size, 80);
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 30px monospace';
                    ctx.fillText("FATAL", gX + size/2, gY + 40);
                    ctx.globalAlpha = 1.0;

                    if (err.exploding > 15) droppedErrors.splice(i, 1); // Rimuovi finito
                } else {
                    // FINESTRA NORMALE
                    drawWin95Window(err.x - 60, err.y - 40, 140, 80, "Error", false);
                    ctx.fillStyle = "red"; ctx.font = "bold 20px Arial"; ctx.fillText("X", err.x - 30, err.y + 10);
                    ctx.fillStyle = "black"; ctx.font = "18px VT323"; ctx.fillText("FATAL", err.x + 10, err.y + 10);
                }
            }
        }

        // --- 5. EVENTO BOSS TUNNEL (Jumpscare PIÙ GIGANTE) ---
        let tunnelTimer = 0;
        let tunnelMaxTime = 60; 
        let tunnelX = 0; let tunnelY = 0;

        function triggerBossTunnel() {
            if (tunnelTimer === 0 && tunnelImg.complete && Math.random() > 0.998) {
                tunnelTimer = 1;
                tunnelX = Math.random() * (canvas.width * 0.6) + canvas.width * 0.2;
                tunnelY = Math.random() * (canvas.height * 0.6) + canvas.height * 0.2;
            }

            if (tunnelTimer > 0) {
                let progress = tunnelTimer / tunnelMaxTime; 
                let spriteFrame = Math.floor(progress * 24); 
                let col = spriteFrame % 5; let row = Math.floor(spriteFrame / 5);

                // --- MOLTIPLICATORE DI SCALA AUMENTATO (Da 3.3 a 6.5) ---
                let currentScale = 0.2 + (progress * 6.5); 
                let size = 256;

                ctx.save();
                ctx.translate(tunnelX, tunnelY);
                
                let glitchX = (Math.random() - 0.5) * 40 * progress;
                let glitchY = (Math.random() - 0.5) * 40 * progress;

                ctx.scale(currentScale, currentScale);
                ctx.globalAlpha = 0.9;

                if (Math.random() > 0.6) {
                    ctx.globalCompositeOperation = 'screen';
                    ctx.shadowColor = "red"; ctx.shadowBlur = 10;
                    ctx.drawImage(tunnelImg, col * 256, row * 256, 256, 256, (-size/2) + glitchX - 10, (-size/2) + glitchY, size, size);
                    ctx.shadowColor = "cyan"; ctx.shadowBlur = 10;
                    ctx.drawImage(tunnelImg, col * 256, row * 256, 256, 256, (-size/2) + glitchX + 10, (-size/2) + glitchY, size, size);
                } else {
                    ctx.drawImage(tunnelImg, col * 256, row * 256, 256, 256, (-size/2) + glitchX, (-size/2) + glitchY, size, size);
                }

                ctx.restore();

                tunnelTimer++;
                if (tunnelTimer > tunnelMaxTime) tunnelTimer = 0; 
            }
        }

        // --- 6. RENDER FINALE ---
        let mainTimer = 0;

        function animazione() {
            mainTimer++;

            // LAYER 0: SFONDO E CARTELLE
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let f of folders) {
                ctx.fillStyle = '#ffcc00'; ctx.fillRect(f.x, f.y+5, 40, 30); ctx.fillRect(f.x, f.y, 15, 5); 
                ctx.fillStyle = '#ffffff'; ctx.font = '22px VT323'; ctx.textAlign = 'center'; 
                
                let words = f.name.split(' ');
                if(words.length > 1 && f.name !== "CANNE MOZZE" && f.name !== "VAI VIA" && f.name !== "MON AMI") {
                    ctx.fillText(words[0], f.x + 20, f.y + 55);
                    ctx.fillText(words.slice(1).join(' '), f.x + 20, f.y + 75);
                } else {
                    ctx.fillText(f.name, f.x + 20, f.y + 55);
                }
            }

            // LAYER 1: IL TUNNEL BOSS JUMPSCARE (Dietro tutto il caos animato)
            triggerBossTunnel();

            // LAYER 2: GLI ERRORI DROPPATI DAL WORM (Sul Desktop)
            drawDroppedErrors();

            // LAYER 3: IL WORM ASCII (Davanti agli Errori e al Tunnel, ma Dietro al Logo)
            arrayMurene = arrayMurene.filter(m => !m.isDead());
            if (arrayMurene.length === 0) arrayMurene.push(new MurenaWorm()); 
            arrayMurene.forEach(m => m.update());
            arrayMurene.forEach(m => m.draw());

            // LAYER 4: LA FINESTRA MADRE (PRIMISSIMO PIANO) - DINAMICA E MISURATA
            if (tintedLogo.width > 0) {
                let maxLogoW = canvas.width * 0.55; 
                let maxLogoH = canvas.height * 0.45;
                let logoScale = Math.min(maxLogoW / tintedLogo.width, maxLogoH / tintedLogo.height);
                let lW = tintedLogo.width * logoScale;
                let lH = tintedLogo.height * logoScale;
                
                // Margini e dimensioni Finestra dinamici sul logo
                let padX = 40; 
                let padTop = 60; // Spazio per la barra titolo Win95
                let padBot = 90; // Spazio per i bottoni
                
                let wW = lW + padX * 2;
                let wH = lH + padTop + padBot;
                let wX = (canvas.width - wW) / 2;
                let wY = (canvas.height - wH) / 2;

                let isMainActive = (Math.floor(mainTimer / 10) % 2 === 0);
                drawWin95Window(wX, wY, wW, wH, "STUDIO_MURENA_FATAL_EXCEPTION.EXE", isMainActive);
                
                // Disegna Logo
                ctx.drawImage(tintedLogo, wX + padX, wY + padTop, lW, lH);

                // Tasti in basso
                let btnW = Math.min(120, (wW - 80) / 3); 
                let btnH = 40;
                let btnY = wY + wH - 60;
                let gap = 20;
                let totalBtnWidth = (btnW * 3) + (gap * 2);
                let startX = wX + (wW - totalBtnWidth) / 2;

                drawWin95Button(startX, btnY, btnW, btnH, "ANNULLA", (Math.floor(mainTimer / 15) % 3 === 0));
                drawWin95Button(startX + btnW + gap, btnY, btnW, btnH, "RIPROVA", (Math.floor(mainTimer / 15) % 3 === 1));
                drawWin95Button(startX + (btnW + gap)*2, btnY, btnW, btnH, "IGNORA", (Math.floor(mainTimer / 15) % 3 === 2));
            }

            requestAnimationFrame(animazione);
        }

        animazione();

    </script>
</body>
</html>
